<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikuStream | Watch Anime</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">MIKUSTREAM</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Movies</a></li>
                <li><a href="#">TV Series</a></li>
            </ul>
        </nav>
        <div class="search-area">
            <input type="text" placeholder="Search anime...">
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <span class="rank">#1 Spotlight</span>
            <h1>Hatsune Miku: Project Diva</h1>
            <p>The ultimate digital concert experience is now streaming.</p>
            <div class="hero-btns">
                <a href="watch.html" class="btn-play">Watch Now</a>
                <button class="btn-info">+ Add to List</button>
            </div>
        </div>
    </section>

    <main class="container">
        <h2>Recent Updates</h2>
        <div class="anime-grid">
            <div class="anime-card">
                <img src="https://via.placeholder.com/200x280" alt="Anime Poster">
                <p>Miku Adventure</p>
                <span class="sub-info">Ep 12 | Sub</span>
            </div>
            </div>
    </main>

</body>
</html>
