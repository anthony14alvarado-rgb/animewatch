<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeWatch | Solo Leveling</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="glass-nav">
        <div class="logo">ANIME<span>WATCH</span></div>
        <div class="search-pill">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search anime...">
        </div>
    </header>

    <section class="hero">
        <div class="hero-bg"></div>

        <div class="hero-content">
            <span class="spotlight-tag"><i class="fas fa-fire"></i> #1 Spotlight</span>
            <h1 class="hero-title">Solo Leveling</h1>
            
            <div class="meta-row">
                <span class="rating"><i class="fas fa-star"></i> 9.1</span>
                <span>TV-14</span>
                <span>24m</span>
                <span class="quality">4K</span>
            </div>

            <p class="description">Ten years after the "Gates" appeared, the world's weakest hunter begins his legendary ascent. Witness the power of the Shadow Monarch in stunning detail.</p>
            
            <div class="btn-group">
                <button class="btn-main"><i class="fas fa-play"></i> WATCH NOW</button>
                <button class="btn-circle"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </section>

    <main class="container">
        <div class="section-header">
            <h2>Trending Now</h2>
            <a href="#" class="view-all">View All ></a>
        </div>

        <div class="anime-grid">
            <div class="anime-card">
                <div class="poster-wrapper">
                    <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx154587-nBy076N9vX6q.jpg">
                    <div class="ep-tag">SUB | DUB</div>
                </div>
                <h3>Jujutsu Kaisen</h3>
            </div>

            <div class="anime-card">
                <div class="poster-wrapper">
                    <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/nx21-6ST6re6N94Iq.jpg">
                    <div class="ep-tag">SUB | DUB</div>
                </div>
                <h3>One Piece</h3>
            </div>
        </div>
    </main>

</body>
</html>
