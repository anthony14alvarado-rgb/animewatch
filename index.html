<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeWatch | Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">ANIME<span>WATCH</span></div>
        <div class="search-bar">
            <input type="text" placeholder="Search anime...">
        </div>
    </header>

    <section class="spotlight">
        <div class="spotlight-content">
            <div class="tag">#1 Spotlight</div>
            <h1>Solo Leveling</h1>
            <p>In a world where hunters must battle deadly monsters to survive, Sung Jinwoo is the weakest of them all... until everything changes.</p>
            <div class="spotlight-btns">
                <button class="btn-watch">Watch Now</button>
                <button class="btn-add">+</button>
            </div>
        </div>
    </section>

    <main class="content-area">
        <h2 class="section-title">Trending Now</h2>
        <div class="anime-grid">
            
            <div class="anime-card">
                <div class="poster">
                    <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx154587-nBy076N9vX6q.jpg" alt="JJK">
                    <div class="ep-count">Ep 24</div>
                </div>
                <h3>Jujutsu Kaisen</h3>
            </div>

            <div class="anime-card">
                <div class="poster">
                    <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/nx21-6ST6re6N94Iq.jpg" alt="One Piece">
                    <div class="ep-count">Ep 1100+</div>
                </div>
                <h3>One Piece</h3>
            </div>

            <div class="anime-card">
                <div class="poster">
                    <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx16498-C6pe1zsU3B94.jpg" alt="Attack on Titan">
                    <div class="ep-count">Final Season</div>
                </div>
                <h3>Attack on Titan</h3>
            </div>

        </div>
    </main>

</body>
</html>
